<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">Islander lagoon streetwear campaign</title>
  <desc id="desc">Premium streetwear campaign scene with stylized models in front of a New Caledonia inspired lagoon, reef and sandbank.</desc>
  <defs>
    <linearGradient id="lagoon" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#08313a"/>
      <stop offset=".28" stop-color="#0d6f78"/>
      <stop offset=".62" stop-color="#64c8c3"/>
      <stop offset="1" stop-color="#dff1df"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff5dc"/>
      <stop offset=".62" stop-color="#dacd9f"/>
      <stop offset="1" stop-color="#8fa486"/>
    </linearGradient>
    <linearGradient id="inkFade" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#060606" stop-opacity=".88"/>
      <stop offset=".54" stop-color="#060606" stop-opacity=".2"/>
      <stop offset="1" stop-color="#060606" stop-opacity=".5"/>
    </linearGradient>
    <radialGradient id="reefA" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#f1e8b8" stop-opacity=".82"/>
      <stop offset=".45" stop-color="#2ba69d" stop-opacity=".62"/>
      <stop offset=".76" stop-color="#08313a" stop-opacity=".58"/>
      <stop offset="1" stop-color="#08313a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="reefB" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".7"/>
      <stop offset=".38" stop-color="#77d5cd" stop-opacity=".54"/>
      <stop offset=".84" stop-color="#08313a" stop-opacity="0"/>
    </radialGradient>
    <filter id="paper" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency=".85" numOctaves="2" seed="8" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .16"/>
      </feComponentTransfer>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="170%" height="180%">
      <feDropShadow dx="0" dy="32" stdDeviation="20" flood-color="#000" flood-opacity=".34"/>
    </filter>
    <pattern id="mesh" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M0 9h18M9 0v18" stroke="#101010" stroke-opacity=".16" stroke-width="1"/>
    </pattern>
    <pattern id="halftone" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.5" fill="#f4f0e8" opacity=".28"/>
      <circle cx="16" cy="16" r="1.3" fill="#f4f0e8" opacity=".22"/>
    </pattern>
  </defs>

  <rect width="1800" height="1100" fill="url(#lagoon)"/>
  <rect width="1800" height="1100" filter="url(#paper)" opacity=".7"/>

  <g opacity=".95">
